<style>

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1100px 700px at 78% -8%, rgba(120, 110, 220, 0.20), transparent 60%),

    overflow-x: hidden;

  /* 별 배경 */
  .sky { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: var(--star); opacity: 0.5;
    animation: twinkle 3.6s ease-in-out infinite;
  }
  @keyframes twinkle { 0%,100%{opacity:.18;} 50%{opacity:.85;} }

  .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 38px 18px 60px; }

  header.top { text-align: center; margin-bottom: 26px; }
  .brand {
    font-size: 13px; letter-spacing: 3px; color: var(--gold-soft);
    text-transform: uppercase; margin-bottom: 10px;
  }
  h1 {
    font-size: clamp(26px, 5vw, 40px); margin: 0 0 8px;
    background: linear-gradient(180deg, #fff 0%, var(--gold) 90%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .sub { color: var(--text-dim); font-size: 14px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 18px;
    padding: 22px;
    backdrop-filter: blur(8px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.45);
  }

  .form-row { display: flex; gap: 10px; margin-top: 6px; }
  input[type=text] {
    flex: 1; min-width: 0;
    background: rgba(8,9,22,0.7); border: 1px solid var(--panel-line);
    color: var(--text); border-radius: 12px; padding: 14px 16px; font-size: 16px;
    outline: none; transition: border-color .15s;
  }
  input[type=text]:focus { border-color: var(--gold-soft); }
  button.go {
    background: linear-gradient(180deg, var(--gold), var(--gold-soft));
    color: #1a1606; border: none; border-radius: 12px;
    padding: 0 22px; font-size: 16px; font-weight: 800; cursor: pointer;
    white-space: nowrap; transition: transform .08s, filter .15s;
  }
  button.go:hover { filter: brightness(1.07); }
  button.go:active { transform: translateY(1px); }
  button.go:disabled { opacity: .55; cursor: default; }
  .hint { color: var(--text-dim); font-size: 12.5px; margin-top: 10px; }

  /* 결과 */
  #result { margin-top: 24px; display: none; }
  #result.show { display: block; animation: fadein .4s ease; }
  @keyframes fadein { from{opacity:0; transform: translateY(8px);} to{opacity:1; transform:none;} }

  .res-date { color: var(--gold); font-size: 15px; letter-spacing: 1px; }
  .res-name { font-size: 22px; font-weight: 800; margin-top: 4px; }
  .res-meta { color: var(--text-dim); font-size: 13px; margin-top: 4px; }

  .total {
    text-align: center; padding: 18px; margin: 14px 0 22px;
    border: 1px solid var(--panel-line); border-radius: 14px;
    background: rgba(10,11,28,0.5);

  .total-line { font-size: 20px; font-weight: 700; margin: 6px 0 2px; }

  .total .advice { color: var(--text); font-size: 14px; margin: 6px 0 2px; }

    display: flex; gap: 14px; align-items: flex-start;

/* HTML escape (직업운 {class} 등 외부 유래 문자열을 innerHTML에 넣기 전 안전 처리) */
function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}

/* ---------- 별 배경 ---------- */
(function makeStars(){
  const sky = document.getElementById("sky");
  const n = 70;
  let html = "";
  // 배경 장식이라 Math.random 사용(운세 결과와 무관)
  for (let i = 0; i < n; i++) {
    const x = Math.random()*100, y = Math.random()*100;
    const d = (Math.random()*3.5).toFixed(2);
    const s = (Math.random()*1.6 + 1).toFixed(1);
    html += `<span class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;animation-delay:${d}s"></span>`;
  }
  sky.innerHTML = html;
})();

/* ---------- 결정적 RNG: xmur3 + mulberry32 ---------- */
function xmur3(str) {
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function () {
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return h >>> 0;
  };
}
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function rngFrom(seedStr) {
  const seed = xmur3(seedStr)();
  return mulberry32(seed);
}

/* ---------- 날짜(KST) ---------- */
function kstDateStr(d) {
  // KST = UTC+9. 'en-CA' 로케일은 YYYY-MM-DD 형식.
  return new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Seoul", year: "numeric", month: "2-digit", day: "2-digit"
  }).format(d);
}
function kstMonthDay(d) {
  const parts = new Intl.DateTimeFormat("ko-KR", {
    timeZone: "Asia/Seoul", month: "long", day: "numeric"
  }).formatToParts(d);
  const m = parts.find(p => p.type === "month")?.value || "";
  const day = parts.find(p => p.type === "day")?.value || "";
  return `${m} ${day}일`;
}

/* ---------- 점수 → 등급 ---------- */
// 영웅~전설이 흔하고 노말/에스더가 드물게: 균등난수 3개 평균(중앙 편향)
function score0to100(rng) {
  const avg = (rng() + rng() + rng()) / 3; // 0.5 부근에 집중
  return Math.round(avg * 100);
}
// 로아 장비 등급 밴드 (노말 → 에스더). 색은 인게임 등급 색감.
// 문구 톤 버킷: bad(노말·희귀) / mid(영웅·전설) / good(유물·고대·에스더)
function gradeOf(score) {
  if (score <= 12) return { name: "노말",   bucket: "bad",  color: "#cfd0db" };
  if (score <= 32) return { name: "희귀",   bucket: "bad",  color: "#4eb1ff" };
  if (score <= 58) return { name: "영웅",   bucket: "mid",  color: "#c965e0" };
  if (score <= 78) return { name: "전설",   bucket: "mid",  color: "#f7a325" };
  if (score <= 90) return { name: "유물",   bucket: "good", color: "#fa6a32" };
  if (score <= 97) return { name: "고대",   bucket: "good", color: "#e6d2a8" };
  return                  { name: "에스더", bucket: "good", color: "#3fe0d0" };
}

function pick(rng, arr) { return arr[Math.floor(rng() * arr.length)]; }

    ],
    bad: [
      "{class} 손 꼬이는 날. 무리한 트라이 자제하세요.",
      "{class} 컨디션 바닥. 오늘은 안전하게 가세요.",
      "{class}에게 역풍. 한 발 물러서는 게 이득."
    ]
  }
};

// 총운 한줄 조언 (등급 버킷별)
const ADVICE = {
  good: [
    "흐름 좋은 날. 미뤄둔 도전 오늘 가보죠.",
    "기운이 트였습니다. 큰 거 한 방 노려볼 만해요.",
    "운이 따르는 날. 자신감 있게 밀어붙이세요."
  ],
  mid: [
    "평범한 하루. 하던 대로 꾸준히 가면 됩니다.",
    "무난한 날. 일일 숙제만 챙겨도 충분해요.",
    "특별할 것 없는 날. 기대도 실망도 적당히."
  ],
  bad: [
    "오늘은 재련 하지 말고 큰 거 지르지 마세요.",
    "무리한 도전은 금물. 일일만 돌고 쉬는 날.",
    "오늘은 욕심 내려놓는 게 이득입니다."
  ]
};

const LUCKY_CONTENTS = [
  "카오스 던전", "가디언 토벌", "군단장 레이드", "어비스 던전",
  "필드 보스", "모험 섬", "카오스 게이트", "유령선", "쿠르잔 전선",
  "큐브", "보스 러시", "엘리트 가디언"
];

const CATEGORIES = ["재련운", "품질운", "카드운", "골드운", "파티원운", "직업운"];

/* ---------- 한 카테고리 운세 계산 ---------- */
function computeCategory(name, dateStr, cat, className) {
  const rng = rngFrom(`${name}|${dateStr}|${cat}`);
  const score = score0to100(rng);
  const grade = gradeOf(score);
  let text = pick(rng, TEXT[cat][grade.bucket]);
  if (cat === "직업운") {
    text = text.replaceAll("{class}", esc(className || "당신의 직업"));
  }
  return { cat, score, grade, text };
}

/* ---------- 별자리형 게이지 SVG ---------- */
function gaugeSvg(score, color) {
  const r = 26, cx = 32, cy = 32, circ = 2 * Math.PI * r;
  const off = circ * (1 - score / 100);
  return `
  <svg class="gauge" viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="5"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}"
      transform="rotate(-90 ${cx} ${cy})" />
    <circle cx="${cx}" cy="${cy - r}" r="2.4" fill="${color}" transform="rotate(${score*3.6} ${cx} ${cy})"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="15" font-weight="800" fill="${color}">${score}</text>
  </svg>`;
}

/* ---------- 렌더링 ---------- */
const $ = (id) => document.getElementById(id);
let lastResultText = "";
let lastShare = null;

async function fetchProfile(name) {
  try {
    const r = await fetch(`/api/fortune?name=${encodeURIComponent(name)}`);
    if (!r.ok) return { found: false };
    return await r.json();
  } catch (e) {
    return { found: false };
  }
}

async function run() {
  const name = $("nick").value.trim();
  $("err").style.display = "none";
  if (!name) {
    $("err").textContent = "닉네임을 입력해 주세요.";
    $("err").style.display = "block";
    return;
  }

  $("goBtn").disabled = true;
  $("goBtn").textContent = "별 읽는 중…";

  const now = new Date();
  const dateStr = kstDateStr(now);     // 시드용 (YYYY-MM-DD, KST)
  const profile = await fetchProfile(name);
  const className = profile.found ? profile.className : null;

  // 6개 카테고리 — 클래스는 시드에 넣지 않는다(직업운 문구 치환에만 사용)
  const cats = CATEGORIES.map(c => computeCategory(name, dateStr, c, className));

  // 총운 = 카테고리 평균. 단, 6개 평균은 중앙(50)으로 너무 쏠려 늘 '영웅'이 나옴
  // → 50 기준으로 편차를 다시 펼쳐(상관관계는 유지) 7등급에 골고루 분포시킴
  const rawAvg = cats.reduce((s, c) => s + c.score, 0) / cats.length;
  const avgScore = Math.max(0, Math.min(100, Math.round(50 + (rawAvg - 50) * 3.2)));
  const totalGrade = gradeOf(avgScore);

  // 행운 요소 (날짜+닉 기반 별도 시드)
  const lr = rngFrom(`${name}|${dateStr}|lucky`);
  const luckyContent = pick(lr, LUCKY_CONTENTS);
  const h = Math.floor(lr() * 24);
  const luckyTime = `${String(h).padStart(2,"0")}시 ~ ${String((h+2)%24).padStart(2,"0")}시`;
  const luckyNum = 1 + Math.floor(lr() * 9);

  // --- DOM ---
  $("resDate").textContent = `✦ ${kstMonthDay(now)}의 운세 ✦`;
  $("resName").textContent = profile.found ? profile.name : name;
  $("resMeta").textContent = profile.found
    ? [profile.className, profile.itemLevel ? `아이템 ${profile.itemLevel.toLocaleString()}` : null, profile.server]
        .filter(Boolean).join(" · ")
    : "캐릭터 정보를 불러오지 못해 닉네임의 기운만으로 보았어요";

  $("totalGrade").textContent = totalGrade.name;
  $("totalGrade").style.color = totalGrade.color;
  const advice = pick(rngFrom(`${name}|${dateStr}|advice`), ADVICE[totalGrade.bucket]);
  $("totalAdvice").textContent = advice;
  $("totalScore").textContent = `종합 점수 ${avgScore} / 100`;

  $("cats").innerHTML = cats.map(c => `
    <div class="cat">
      ${gaugeSvg(c.score, c.grade.color)}
      <div class="cat-body">
        <div class="cat-top">
          <span class="cat-name">${c.cat}</span>
          <span class="cat-grade" style="color:${c.grade.color}">${c.grade.name}</span>
          <span class="cat-score">${c.score}점</span>
        </div>
        <div class="cat-text">${c.text}</div>
      </div>
    </div>`).join("");

  $("luckyContent").textContent = luckyContent;
  $("luckyTime").textContent = luckyTime;
  $("luckyNum").textContent = luckyNum;

  // 복사/공유용 텍스트
  const shareName = profile.found ? profile.name : name;
  const dateLabel = kstMonthDay(now);
  lastResultText = buildShareText({
    name: shareName, dateLabel, totalGrade, avgScore, advice, cats,
    luckyContent, luckyTime, luckyNum
  });
  // 카카오 text 템플릿은 200자 제한 → 짧은 버전 별도
  lastShare = {
    title: `${dateLabel}의 운세 · ${shareName}`,
    short: `✦ ${dateLabel}의 운세 · ${shareName}\n오늘의 운세는 ${totalGrade.name} 등급 (${avgScore}/100)\n행운: ${luckyContent} / ${luckyTime} / ${luckyNum}`,
  };

  $("result").classList.add("show");
  $("goBtn").disabled = false;
  $("goBtn").textContent = "운세 보기";
  $("result").scrollIntoView({ behavior: "smooth", block: "start" });
}

function buildShareText(d) {
  const lines = [];
  lines.push(`✦ ${d.dateLabel}의 운세 · ${d.name} ✦`);
  lines.push(`오늘의 운세는 ${d.totalGrade.name} 등급 (${d.avgScore}/100)`);
  lines.push(d.advice);
  lines.push("");
  d.cats.forEach(c => lines.push(`${c.cat} ${c.grade.name}(${c.score}) — ${c.text}`));
  lines.push("");
  lines.push(`행운의 콘텐츠: ${d.luckyContent} / 시간: ${d.luckyTime} / 숫자: ${d.luckyNum}`);
  lines.push("");
  lines.push("※ 비공식 팬메이드 · 로스트아크와 무관 · 재미용 운세");
  return lines.join("\n");
}

async function copyResult() {
  if (!lastResultText) return;
  try {
    await navigator.clipboard.writeText(lastResultText);
    const b = $("copyBtn"); const old = b.textContent;
    b.textContent = "✓ 복사됐어요";
    setTimeout(() => (b.textContent = old), 1500);
  } catch (e) {
    // 클립보드 권한 실패 시 폴백
    const ta = document.createElement("textarea");
    ta.value = lastResultText; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch (_) {}
    document.body.removeChild(ta);
  }
}

/* ---------- 이미지 캡처 / 공유 ---------- */
async function captureCanvas() {
  return await html2canvas($("shareCard"), {
    backgroundColor: "#0a0a14",
    scale: Math.min(2, window.devicePixelRatio || 1.5),
    useCORS: true,
    // 버튼 영역은 이미지에서 제외
    ignoreElements: (el) => el.classList && el.classList.contains("actions"),
  });
}

async function saveImage() {
  if (typeof html2canvas === "undefined") {
    alert("이미지 변환 모듈을 불러오지 못했어요. 잠시 후 다시 시도해 주세요.");
    return;
  }
  const b = $("imgBtn"); const old = b.textContent; b.disabled = true; b.textContent = "만드는 중…";
  try {
    const canvas = await captureCanvas();
    const a = document.createElement("a");
    a.download = "로아_오늘의_운세.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  } catch (e) {
    alert("이미지 저장에 실패했어요.");
  } finally {
    b.disabled = false; b.textContent = old;
  }
}

async function shareNative() {
  const url = location.href;
  let file = null;
  // 이미지 파일 공유가 가능하면 결과 이미지를 같이 공유
  if (typeof html2canvas !== "undefined" && navigator.canShare) {
    try {
      const canvas = await captureCanvas();
      const blob = await new Promise((r) => canvas.toBlob(r, "image/png"));
      if (blob) {
        const f = new File([blob], "로아_오늘의_운세.png", { type: "image/png" });
        if (navigator.canShare({ files: [f] })) file = f;
      }
    } catch (_) { /* 이미지 실패 시 텍스트로 */ }
  }
  try {
    if (file) {
      await navigator.share({ files: [file], title: lastShare?.title || "로아 오늘의 운세", text: lastResultText });
    } else if (navigator.share) {
      await navigator.share({ title: lastShare?.title || "로아 오늘의 운세", text: lastResultText, url });
    } else {
      copyResult();
    }
  } catch (_) { /* 사용자가 공유를 취소한 경우 등은 조용히 무시 */ }
}

function kakaoShare() {
  if (!window.Kakao || !window.Kakao.isInitialized?.()) return;
  Kakao.Share.sendDefault({
    objectType: "text",
    text: (lastShare?.short || "로아 오늘의 운세") + "\n\n👉 내 운세도 보기",
    link: { mobileWebUrl: location.href, webUrl: location.href },
  });
}

// 환경에 따라 가능한 공유 버튼만 노출 (Kakao SDK는 defer 로딩이라 load 시점에 확인)
function initShareButtons() {
  if (navigator.share) $("shareBtn").style.display = "";
  if (KAKAO_JS_KEY && window.Kakao) {
    try {
      if (!Kakao.isInitialized()) Kakao.init(KAKAO_JS_KEY);
      $("kakaoBtn").style.display = "";
    } catch (_) { /* 키가 잘못된 경우 버튼 숨김 유지 */ }
  }
}
window.addEventListener("load", initShareButtons);

$("goBtn").addEventListener("click", run);
$("nick").addEventListener("keydown", (e) => { if (e.key === "Enter") run(); });
$("copyBtn").addEventListener("click", copyResult);
$("imgBtn").addEventListener("click", saveImage);
$("shareBtn").addEventListener("click", shareNative);
$("kakaoBtn").addEventListener("click", kakaoShare);
$("againBtn").addEventListener("click", () => {
  $("result").classList.remove("show");
  $("nick").value = ""; $("nick").focus();
  window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>
