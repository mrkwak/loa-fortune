<script>
"use strict";

/* ---------- 별 배경 ---------- */
(function makeStars(){
  const sky = document.getElementById("sky");
  const n = 70;
  let html = "";
  // 배경 장식이라 Math.random 사용(운세 결과와 무관)
  for (let i = 0; i < n; i++) {
    const x = Math.random()*100, y = Math.random()*100;
    const d = (Math.random()*3.5).toFixed(2);
    const s = (Math.random()*1.6 + 1).toFixed(1);
    html += `<span class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;animation-delay:${d}s"></span>`;
  }
  sky.innerHTML = html;
})();

/* ---------- 결정적 RNG: xmur3 + mulberry32 ---------- */
function xmur3(str) {
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function () {
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return h >>> 0;
  };
}
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function rngFrom(seedStr) {
  const seed = xmur3(seedStr)();
  return mulberry32(seed);
}

/* ---------- 날짜(KST) ---------- */
function kstDateStr(d) {
  // KST = UTC+9. 'en-CA' 로케일은 YYYY-MM-DD 형식.
  return new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Seoul", year: "numeric", month: "2-digit", day: "2-digit"
  }).format(d);
}
function kstMonthDay(d) {
  const parts = new Intl.DateTimeFormat("ko-KR", {
    timeZone: "Asia/Seoul", month: "long", day: "numeric"
  }).formatToParts(d);
  const m = parts.find(p => p.type === "month")?.value || "";
  const day = parts.find(p => p.type === "day")?.value || "";
  return `${m} ${day}일`;
}

/* ---------- 점수 → 등급 ---------- */
// 평~길이 흔하고 대흉/대길이 드물게: 균등난수 3개 평균(중앙 편향)
function score0to100(rng) {
  const avg = (rng() + rng() + rng()) / 3; // 0.5 부근에 집중
  return Math.round(avg * 100);
}
// 등급 밴드
function gradeOf(score) {
  if (score <= 7)  return { name: "대흉", bucket: "bad",  cls: "g-bad" };
  if (score <= 27) return { name: "흉",   bucket: "bad",  cls: "g-bad" };
  if (score <= 62) return { name: "평",   bucket: "mid",  cls: "g-mid" };
  if (score <= 87) return { name: "길",   bucket: "good", cls: "g-good" };
  return                  { name: "대길", bucket: "good", cls: "g-good" };
}

function pick(rng, arr) { return arr[Math.floor(rng() * arr.length)]; }

/* ---------- 한 카테고리 운세 계산 ---------- */
function computeCategory(name, dateStr, cat, className) {
  const rng = rngFrom(`${name}|${dateStr}|${cat}`);
  const score = score0to100(rng);
  const grade = gradeOf(score);
  let text = pick(rng, TEXT[cat][grade.bucket]);
  if (cat === "직업운") {
    text = text.replaceAll("{class}", className || "당신의 직업");
  }
  return { cat, score, grade, text };
}

/* ---------- 별자리형 게이지 SVG ---------- */
function gaugeSvg(score, bucket) {
  const color = bucket === "good" ? "#7ee0a8" : bucket === "bad" ? "#e08a8a" : "#e6c46a";
  const r = 26, cx = 32, cy = 32, circ = 2 * Math.PI * r;
  const off = circ * (1 - score / 100);
  return `
  <svg class="gauge" viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="5"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}"
      transform="rotate(-90 ${cx} ${cy})" />
    <circle cx="${cx}" cy="${cy - r}" r="2.4" fill="${color}" transform="rotate(${score*3.6} ${cx} ${cy})"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="15" font-weight="800" fill="${color}">${score}</text>
  </svg>`;
}

/* ---------- 렌더링 ---------- */
const $ = (id) => document.getElementById(id);
let lastResultText = "";

async function fetchProfile(name) {
  try {
    const r = await fetch(`/api/fortune?name=${encodeURIComponent(name)}`);
    if (!r.ok) return { found: false };
    return await r.json();
  } catch (e) {
    return { found: false };
  }
}

async function run() {
  const name = $("nick").value.trim();
  $("err").style.display = "none";
  if (!name) {
    $("err").textContent = "닉네임을 입력해 주세요.";
    $("err").style.display = "block";
    return;
  }

  $("goBtn").disabled = true;
  $("goBtn").textContent = "별 읽는 중…";

  const now = new Date();
  const dateStr = kstDateStr(now);     // 시드용 (YYYY-MM-DD, KST)
  const profile = await fetchProfile(name);
  const className = profile.found ? profile.className : null;

  // 6개 카테고리 — 클래스는 시드에 넣지 않는다(직업운 문구 치환에만 사용)
  const cats = CATEGORIES.map(c => computeCategory(name, dateStr, c, className));

  // 총운 = 카테고리 평균
  const avgScore = Math.round(cats.reduce((s, c) => s + c.score, 0) / cats.length);
  const totalGrade = gradeOf(avgScore);

  // 행운 요소 (날짜+닉 기반 별도 시드)
  const lr = rngFrom(`${name}|${dateStr}|lucky`);
  const luckyContent = pick(lr, LUCKY_CONTENTS);
  const h = Math.floor(lr() * 24);
  const luckyTime = `${String(h).padStart(2,"0")}시 ~ ${String((h+2)%24).padStart(2,"0")}시`;
  const luckyNum = 1 + Math.floor(lr() * 9);

  // --- DOM ---
  $("resDate").textContent = `✦ ${kstMonthDay(now)}의 운세 ✦`;
  $("resName").textContent = profile.found ? profile.name : name;
  $("resMeta").textContent = profile.found
    ? [profile.className, profile.itemLevel ? `아이템 ${profile.itemLevel.toLocaleString()}` : null, profile.server]
        .filter(Boolean).join(" · ")
    : "캐릭터 정보를 불러오지 못해 닉네임의 기운만으로 보았어요";

  $("totalGrade").textContent = totalGrade.name;
  $("totalGrade").className = "grade " + totalGrade.cls;
  $("totalScore").textContent = `종합 점수 ${avgScore} / 100`;

  $("cats").innerHTML = cats.map(c => `
    <div class="cat">
      ${gaugeSvg(c.score, c.grade.bucket)}
      <div class="cat-body">
        <div class="cat-top">
          <span class="cat-name">${c.cat}</span>
          <span class="cat-grade ${c.grade.cls}">${c.grade.name}</span>
          <span class="cat-score">${c.score}점</span>
        </div>
        <div class="cat-text">${c.text}</div>
      </div>
    </div>`).join("");

  $("luckyContent").textContent = luckyContent;
  $("luckyTime").textContent = luckyTime;
  $("luckyNum").textContent = luckyNum;

  // 복사용 텍스트
  lastResultText = buildShareText({
    name: profile.found ? profile.name : name,
    dateLabel: kstMonthDay(now), totalGrade, avgScore, cats,
    luckyContent, luckyTime, luckyNum
  });

  $("result").classList.add("show");
  $("goBtn").disabled = false;
  $("goBtn").textContent = "운세 보기";
  $("result").scrollIntoView({ behavior: "smooth", block: "start" });
}

function buildShareText(d) {
  const lines = [];
  lines.push(`✦ ${d.dateLabel}의 운세 · ${d.name} ✦`);
  lines.push(`총운: ${d.totalGrade.name} (${d.avgScore}/100)`);
  lines.push("");
  d.cats.forEach(c => lines.push(`${c.cat} ${c.grade.name}(${c.score}) — ${c.text}`));
  lines.push("");
  lines.push(`행운의 콘텐츠: ${d.luckyContent} / 시간: ${d.luckyTime} / 숫자: ${d.luckyNum}`);
  lines.push("");
  lines.push("※ 비공식 팬메이드 · 로스트아크와 무관 · 재미용 운세");
  return lines.join("\n");
}

async function copyResult() {
  if (!lastResultText) return;
  try {
    await navigator.clipboard.writeText(lastResultText);
    const b = $("copyBtn"); const old = b.textContent;
    b.textContent = "✓ 복사됐어요";
    setTimeout(() => (b.textContent = old), 1500);
  } catch (e) {
    // 클립보드 권한 실패 시 폴백
    const ta = document.createElement("textarea");
    ta.value = lastResultText; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch (_) {}
    document.body.removeChild(ta);
  }
}

$("goBtn").addEventListener("click", run);
$("nick").addEventListener("keydown", (e) => { if (e.key === "Enter") run(); });
$("copyBtn").addEventListener("click", copyResult);
$("againBtn").addEventListener("click", () => {
  $("result").classList.remove("show");
  $("nick").value = ""; $("nick").focus();
  window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>
</body>
</html>
